## 8. WebSocket

### `WS /ws/projects/{project_id}/stdout`
实时推送 ViMax stdout 输出。

**Client → Server**: 无消息体，连接建立后开始推送。

**Server → Client**:
```json
{
  "type": "stdout",
  "content": "[12:30:45] INFO: Generating story...\n",
  "timestamp": "2026-06-17T12:30:45"
}
```
```json
{
  "type": "status",
  "step_name": "story",
  "step_status": "completed",
  "timestamp": "2026-06-17T12:31:30"
}
```

---

## Error Responses

所有错误返回统一格式：

```json
{
  "error": {
    "code": "PROJECT_NOT_FOUND",
    "message": "项目不存在",
    "detail": "Project with id 999 does not exist"
  }
}
```

**HTTP Status Codes**: 400 (Bad Request), 404 (Not Found), 409 (Conflict - 已有项目运行中), 422 (Validation Error), 500 (Internal Error)
