# 中断步骤
## 汉字步骤
# crawl 爬取数据
# download 下载并转换字形图片
# idea 生成创意
# transition 生成过渡描述
# video 生成演变动画
# hanzi
## 正常流程步骤
# story 生成故事
# character 提取角色特征
# portrait 生成角色肖像
# script 生成剧本
# environment 生成环境描述
# environment_images 生成环境图片
# storyboard 生成故事板
# shot_description 生成镜头描述
# camera_tree 生成相机树
# camera_frame 生成相机帧
# shot_video
# shot_transition
# scene_video
# scene_transition
interrupt_step: null

# 模式
mode: hanzi

